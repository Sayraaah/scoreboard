<html>
  <head>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div class="team">
        <h3>HOME</h3>
        <div class="score" id="home-score">0</div>
        <button onclick="addHome(1)">+1</button>
        <button onclick="addHome(2)">+2</button>
        <button onclick="addHome(3)">+3</button>
      </div>

      <div class="team">
        <h3>AWAY</h3>
        <div class="score" id="away-score">0</div>

        <button onclick="addAway(1)">+1</button>
        <button onclick="addAway(2)">+2</button>
        <button onclick="addAway(3)">+3</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
